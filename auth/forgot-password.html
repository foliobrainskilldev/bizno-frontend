<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Bizno</title>
    
    <meta property="og:title" content="Bizno | Crie um Catálogo Digital Profissional">
    <meta property="og:description" content="Transforme a maneira como você vende online. Crie um catálogo digital elegante em minutos.">
    <meta property="og:image" content="https://i.ibb.co/mV9zJD5N/1775299173254.jpg">
    <meta property="og:url" content="https://www.bizno.store">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="https://i.ibb.co/mV9zJD5N/1775299173254.jpg" type="image/jpeg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    
    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body class="bg-blue">

    <div class="spinner-overlay" id="spinner"><div class="spinner"></div></div>
    
    <div style="max-width: 1200px; width: 100%; margin: 0 auto; display: flex; justify-content: center; align-items: center;">
        <div class="box-container">
            <div class="auth-header">
                <iconify-icon icon="solar:letter-send-linear"></iconify-icon>
                <h1>Recuperar Senha</h1>
                <p>Insira o seu e-mail e enviaremos um código para redefinir a sua senha.</p>
            </div>

            <div id="messageBox" class="message-box"></div>

            <form id="forgotPasswordForm">
                <div class="input-group">
                    <input type="email" id="email" class="input-field" required>
                    <iconify-icon icon="solar:letter-linear"></iconify-icon>
                    <label for="email" class="input-label">Seu E-mail de Cadastro</label>
                </div>
                <button type="submit" class="submit-btn">Enviar Código</button>
            </form>

            <div class="auth-link">
                <p><a href="/auth/login">Voltar para o Login</a></p>
            </div>
        </div>
    </div>

    <script src="../assets/js/auth-global.js"></script>
    <script src="../assets/js/pages/forgot-password.js"></script>
</body>
</html>
