<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamentos & Entregas - Bizno</title>
    <link rel="icon" href="https://i.ibb.co/mV9zJD5N/1775299173254.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>
    
    <link rel="stylesheet" href="/assets/css/dashboard-layout.css">
    <link rel="stylesheet" href="/assets/css/pages/sub-ajustes.css">
</head>
<body class="standalone-body">
    <div class="spinner-overlay" id="loader" style="display: none;"><div class="spinner"></div></div>
    <div id="toast-container"></div>

    <main class="editor-standalone-layout">
        <div class="page-header">
            <a href="/dashboard/ajustes" class="secondary-btn back-btn">
                <iconify-icon icon="solar:alt-arrow-left-bold"></iconify-icon>
            </a>
            <h1>Pagamentos e Logística</h1>
        </div>

        <div id="skeleton-view" class="skeleton-container" style="display: block;">
            <div class="skeleton-box" style="height: 450px; border-radius: 12px;"></div>
        </div>
        
        <form id="payments-form" class="form-container" style="display: none;">
            <h2 class="section-title">Opções de Pagamento aos Clientes</h2>
            <p style="color: var(--texto-secundario); font-size: 0.95rem; margin-bottom: 20px;">Quais métodos os clientes podem selecionar ao finalizar o pedido com você no WhatsApp?</p>
            
            <div class="form-group"><div class="switch-group"><label for="acceptMpesa">M-Pesa</label><label class="switch"><input type="checkbox" id="acceptMpesa"><span class="slider"></span></label></div></div>
            <div class="form-group"><div class="switch-group"><label for="acceptEmola">e-Mola</label><label class="switch"><input type="checkbox" id="acceptEmola"><span class="slider"></span></label></div></div>
            <div class="form-group"><div class="switch-group"><label for="acceptTransfer">Transferência Bancária</label><label class="switch"><input type="checkbox" id="acceptTransfer"><span class="slider"></span></label></div></div>

            <h2 class="section-title" style="margin-top: 40px;">Gestão de Entregas</h2>
            <div class="form-group">
                <div class="switch-group">
                    <label for="isDeliveryEnabled">Habilitar Opção de Entrega (Delivery)</label>
                    <label class="switch"><input type="checkbox" id="isDeliveryEnabled"><span class="slider"></span></label>
                </div>
            </div>
            
            <div class="form-group" id="free-delivery-group">
                <label for="freeDeliveryThreshold">Entrega grátis a partir de (MZN)</label>
                <input type="number" id="freeDeliveryThreshold" placeholder="Ex: 5000">
                <small>Deixe vazio ou 0 se não oferece entrega grátis.</small>
            </div>

            <div class="footer-actions">
                <button type="submit" class="primary-btn btn-giant" style="width: 100%;">Salvar Pagamentos & Entregas</button>
            </div>
        </form>
    </main>

    <script src="/assets/js/dashboard-global.js"></script>
    <script src="/assets/js/pages/pagamentos-entregas.js"></script>
</body>
</html>
