<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Categorias - Bizno</title>
    <link rel="icon" href="https://i.ibb.co/mV9zJD5N/1775299173254.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>

    <link rel="stylesheet" href="../assets/css/dashboard-layout.css">
    <link rel="stylesheet" href="../assets/css/pages/categorias.css">
</head>
<body>
    <div id="toast-container"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header"><a href="/dashboard/index" class="sidebar-logo"><h1>Bizno</h1></a></div>
        <div class="sidebar-menu">
            <ul class="menu-links">
                <li class="menu-item"><a href="/dashboard/index"><iconify-icon icon="solar:widget-5-linear"></iconify-icon><span class="link-name">Dashboard</span></a></li>
                <li class="menu-item"><a href="/dashboard/estatisticas"><iconify-icon icon="solar:chart-2-linear"></iconify-icon><span class="link-name">Estatísticas</span></a></li>
                <li class="menu-item active"><a href="/dashboard/produtos"><iconify-icon icon="solar:box-bold-duotone"></iconify-icon><span class="link-name">Produtos</span></a></li>
                <li class="menu-item"><a href="/dashboard/orders"><iconify-icon icon="solar:document-text-linear"></iconify-icon><span class="link-name">Pedidos</span></a></li>
                <li class="menu-item"><a href="/dashboard/ajustes"><iconify-icon icon="solar:settings-linear"></iconify-icon><span class="link-name">Ajustes</span></a></li>
            </ul>
        </div>
        <div class="sidebar-bottom">
            <ul class="menu-links">
                <li class="menu-item"><a href="/dashboard/planos"><iconify-icon icon="solar:card-2-linear"></iconify-icon><span class="link-name">Meu Plano</span></a></li>
            </ul>
        </div>
    </nav>
    
    <div class="page-wrapper">
        <main class="main-content" id="main-content">
            <div class="page-header" id="page-header">
                <div class="page-header-left">
                    <a href="/dashboard/produtos" class="secondary-btn" style="padding: 10px; border: none; font-size: 1.5rem;"><iconify-icon icon="solar:alt-arrow-left-linear"></iconify-icon></a>
                    <h1>Categorias</h1>
                </div>
                <div class="page-header-actions">
                    <button class="primary-btn" id="add-category-btn-desktop">
                        <iconify-icon icon="solar:add-circle-linear"></iconify-icon> Nova Categoria
                    </button>
                </div>
            </div>
            
            <div id="skeleton-view" class="skeleton-container" style="display: block; max-width: 900px;">
                <div class="skeleton-row skeleton-box"></div>
                <div class="skeleton-row skeleton-box"></div>
                <div class="skeleton-row skeleton-box"></div>
            </div>

            <div class="content-container" id="content-view" style="display: none; max-width: 900px;">
                <div class="table-container">
                    <table class="data-table">
                        <thead><tr><th>Imagem</th><th>Nome da Categoria</th><th>Ações</th></tr></thead>
                        <tbody id="categories-tbody"></tbody>
                    </table>
                </div>
                <div class="list-mobile" id="categories-list-mobile"></div>
            </div>
        </main>
    </div>

    <button class="add-category-fab" id="add-category-btn-mobile" title="Adicionar Categoria" style="bottom: 20px;">
        <iconify-icon icon="solar:add-circle-bold"></iconify-icon>
    </button>

    <div class="modal-overlay" id="category-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Nova Categoria</h2>
                <button class="modal-close-btn" id="modal-close-btn"><iconify-icon icon="solar:close-circle-linear"></iconify-icon></button>
            </div>
            <form id="category-form" enctype="multipart/form-data">
                <input type="hidden" id="category-id">
                
                <div class="form-group" style="text-align: center; margin-bottom: 25px;">
                    <div class="category-image-preview" id="category-image-preview">
                        <iconify-icon icon="solar:gallery-linear"></iconify-icon>
                    </div>
                    <label for="category-image" class="custom-file-upload">
                        <iconify-icon icon="solar:upload-track-bold"></iconify-icon> Selecionar Imagem
                    </label>
                    <input type="file" id="category-image" accept="image/*" style="display: none;">
                </div>

                <div class="form-group">
                    <label>Nome da Categoria</label>
                    <input type="text" id="name" required style="padding: 15px;">
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="primary-btn secondary-btn" id="modal-cancel-btn">Cancelar</button>
                    <button type="submit" class="primary-btn">Salvar</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="modal-overlay" id="confirm-modal">
        <div class="confirm-modal">
            <iconify-icon icon="solar:danger-triangle-bold-duotone" style="font-size: 3rem; color: var(--vermelho-alerta); margin-bottom: 15px;"></iconify-icon>
            <h3>Apagar categoria?</h3>
            <div class="modal-actions">
                <button class="modal-btn secondary-btn" id="confirm-cancel-btn">Cancelar</button>
                <button class="modal-btn btn-danger" style="background: var(--vermelho-alerta); color: white; border: none; padding: 10px 20px; border-radius: 8px;" id="confirm-delete-btn">Sim, Apagar</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/dashboard-global.js"></script>
    <script src="../assets/js/pages/categorias.js"></script>
</body>
</html>
